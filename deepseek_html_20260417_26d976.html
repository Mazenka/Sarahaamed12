<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الصراحات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .login-box, .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box h2, .admin-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .confession-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
        }

        .confession-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        .confession-date {
            font-size: 12px;
            color: #999;
        }

        .delete-btn {
            background: #dc3545;
            padding: 5px 15px;
            font-size: 12px;
            margin-top: 10px;
            width: auto;
        }

        .logout-btn {
            background: #6c757d;
            margin-bottom: 20px;
            width: auto;
            padding: 8px 20px;
        }

        .stats {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 لوحة تحكم المدير</h1>
            <p>إدارة الصراحات - أنت فقط من يرى هذا</p>
        </div>

        <div id="loginSection" class="login-box">
            <h2>🔑 دخول المدير</h2>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
            <button onclick="checkPassword()">دخول</button>
        </div>

        <div id="adminSection" style="display: none;">
            <div class="admin-panel">
                <button class="logout-btn" onclick="logout()">🚪 خروج</button>
                <h2>📖 جميع الصراحات</h2>
                <div id="stats" class="stats"></div>
                <div id="confessionsList"></div>
            </div>
        </div>
    </div>

    <script>
        // كلمة المرور - غيرها إلى ما تريد
        const ADMIN_PASSWORD = "admin123";
        
        // عنوان Firebase - سنضيفه بعد
        const FIREBASE_URL = "https://your-project.firebaseio.com/confessions.json";
        
        function checkPassword() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                showAdminPanel();
                loadConfessions();
            } else {
                alert('❌ كلمة المرور غير صحيحة');
            }
        }
        
        function showAdminPanel() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
        }
        
        function logout() {
            localStorage.removeItem('admin_logged_in');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminSection').style.display = 'none';
        }
        
        async function loadConfessions() {
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                
                if (!data) {
                    document.getElementById('confessionsList').innerHTML = '<div class="stats">📭 لا توجد صراحات بعد</div>';
                    document.getElementById('stats').innerHTML = '📊 عدد الصراحات: 0';
                    return;
                }
                
                const confessions = Object.entries(data).map(([id, conf]) => ({ id, ...conf }));
                confessions.sort((a, b) => b.timestamp - a.timestamp);
                
                document.getElementById('stats').innerHTML = `📊 عدد الصراحات: ${confessions.length}`;
                
                let html = '';
                for (let conf of confessions) {
                    html += `
                        <div class="confession-item">
                            <div class="confession-text">💬 ${escapeHtml(conf.text)}</div>
                            <div class="confession-date">📅 ${conf.date}</div>
                            <button class="delete-btn" onclick="deleteConfession('${conf.id}')">🗑️ حذف</button>
                        </div>
                    `;
                }
                document.getElementById('confessionsList').innerHTML = html;
            } catch (error) {
                console.error('خطأ:', error);
            }
        }
        
        async function deleteConfession(id) {
            if (confirm('هل أنت متأكد من حذف هذه الصراحة؟')) {
                await fetch(`https://your-project.firebaseio.com/confessions/${id}.json`, {
                    method: 'DELETE'
                });
                loadConfessions();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // التحقق من تسجيل الدخول عند تحميل الصفحة
        if (localStorage.getItem('admin_logged_in') === 'true') {
            showAdminPanel();
            loadConfessions();
        }
    </script>
</body>
</html>
