<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صراحات - اكتب صراحتك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .admin-link {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }

        .admin-link a {
            color: white;
            opacity: 0.5;
            text-decoration: none;
        }

        .admin-link a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💭 صراحات</h1>
            <p>اكتب صراحتك .. ستبقى مجهولة</p>
        </div>

        <div class="card">
            <h2>✍️ اكتب صراحتك</h2>
            <textarea id="confessionInput" placeholder="اكتب هنا ما تريد قوله... (ستبقى هويتك مجهولة)"></textarea>
            <button onclick="sendConfession()">📤 أرسل الصراحة</button>
            <div id="message" class="message"></div>
        </div>

        <div class="admin-link">
            <a href="admin.html">🔐 دخول المدير</a>
        </div>
    </div>

    <script>
        // عنوان API الخاص بك (سنستخدم Firebase)
        // سأشرح لك كيف تفعل Firebase بعد الكود
        
        async function sendConfession() {
            const input = document.getElementById('confessionInput');
            const text = input.value.trim();
            const messageDiv = document.getElementById('message');
            
            if (text === '') {
                messageDiv.className = 'message';
                messageDiv.style.display = 'block';
                messageDiv.style.background = '#f8d7da';
                messageDiv.style.color = '#721c24';
                messageDiv.textContent = '⚠️ الرجاء كتابة صراحة أولاً';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                return;
            }
            
            // إرسال الصراحة إلى Firebase
            try {
                const response = await fetch('https://your-project.firebaseio.com/confessions.json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        date: new Date().toLocaleString('ar-EG'),
                        timestamp: Date.now()
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ تم إرسال صراحتك بنجاح! 🤫';
                    setTimeout(() => {
                        messageDiv.style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                messageDiv.className = 'message';
                messageDiv.style.background = '#f8d7da';
                messageDiv.style.color = '#721c24';
                messageDiv.textContent = '❌ حدث خطأ، حاول مرة أخرى';
            }
        }
    </script>
</body>
</html>
